<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POST Debug</title>
  <style>
    body { font-family: Arial, 'Microsoft JhengHei', sans-serif; background:#f8fafc; color:#0f172a; padding:24px; }
    textarea { width:100%; min-height:260px; border-radius:14px; border:1px solid #cbd5e1; padding:14px; font-family:monospace; }
    input { width:100%; border-radius:999px; border:1px solid #cbd5e1; padding:12px 14px; margin:10px 0; }
    button { border:0; border-radius:999px; background:#0f172a; color:#fff; padding:12px 18px; font-weight:800; cursor:pointer; }
    pre { background:#0f172a; color:#dbeafe; padding:14px; border-radius:14px; overflow:auto; }
  </style>
</head>
<body>
  <h1>Apps Script POST Debug</h1>
  <p>Paste your Apps Script Web App URL and submit a hidden-form payload test.</p>
  <input id="url" placeholder="Apps Script URL" />
  <textarea id="payload"></textarea>
  <p><button id="sendBtn">Send hidden form POST</button></p>
  <pre id="log">Idle</pre>
  <script>
    const defaultPayload = {
      warningId: 'POST-DEBUG-' + Date.now(),
      timestamp: new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' }),
      hourKey: 'TEST',
      riskLevel: 'High',
      line: 'Spray Line 1',
      station: 'Station 2',
      robot: 'Robot 2',
      processStep: 'Top Coat',
      batchId: 'DEBUG-TEST',
      message: 'POST Debug test from dashboard utility page.',
      mainCause: 'Frontend debug test.',
      suggestedAction: 'No action required.',
      predictedNgPcs: 42,
      predictedOkRate: 86.5,
      recipientRole: 'manager'
    };
    document.getElementById('payload').value = JSON.stringify(defaultPayload, null, 2);
    document.getElementById('sendBtn').addEventListener('click', () => {
      const url = document.getElementById('url').value.trim();
      const payload = JSON.parse(document.getElementById('payload').value);
      if (!url) { document.getElementById('log').textContent = 'Please enter URL.'; return; }
      const iframeName = 'debugFrame_' + Date.now();
      const iframe = document.createElement('iframe');
      iframe.name = iframeName;
      iframe.style.display = 'none';
      const form = document.createElement('form');
      form.method = 'POST';
      form.action = url + '?source=post_debug&ts=' + Date.now();
      form.target = iframeName;
      form.style.display = 'none';
      const input = document.createElement('input');
      input.type = 'hidden';
      input.name = 'payload';
      input.value = JSON.stringify(payload);
      form.appendChild(input);
      document.body.appendChild(iframe);
      document.body.appendChild(form);
      document.getElementById('log').textContent = 'Submitting hidden form POST... check Gmail and Apps Script Executions.';
      form.submit();
      setTimeout(() => { form.remove(); iframe.remove(); document.getElementById('log').textContent += '\nSubmitted. Browser may not read Apps Script response.'; }, 5000);
    });
  </script>
</body>
</html>
