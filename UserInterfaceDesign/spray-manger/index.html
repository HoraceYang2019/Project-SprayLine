<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>噴塗線主管駕駛艙</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="manager-cockpit">
    <header class="top-summary-header" id="managerHeader"></header>

    <nav class="category-buttons" id="categoryButtons" aria-label="主管決策分類"></nav>

    <main class="cockpit-main">
      <section class="main-content-panel" aria-live="polite">
        <div class="main-panel-head">
          <div>
            <p class="panel-eyebrow">主管決策</p>
            <h2 id="activeCategoryTitle">目前狀態</h2>
          </div>
          <div class="qc-delay-note pending-qc" id="selectedQualityNote">
            選定日期品質狀態：<strong>待 QC / 預測品質</strong>
          </div>
        </div>

        <div class="category-content" id="categoryContent"></div>
      </section>

      <aside class="right-recommendation-panel" id="recommendationPanel"></aside>
    </main>

    <footer class="bottom-data-status-bar" id="dataStatusBar"></footer>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
