<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>噴塗線主管駕駛艙</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="manager-cockpit">
    <header class="top-summary-header" id="managerHeader"></header>

    <nav class="category-buttons" id="categoryButtons" aria-label="主管決策分類"></nav>

    <main class="cockpit-main">
      <section class="main-content-panel" aria-live="polite">
        <div class="main-panel-head">
          <div>
            <p class="panel-eyebrow">主管決策</p>
            <h2 id="activeCategoryTitle">狀態實時監控表</h2>
          </div>
          <div class="qc-delay-note pending-qc" id="selectedQualityNote">
            選定日期品質狀態：<strong>待 QC / 預測品質</strong>
          </div>
        </div>

        <div class="category-content" id="categoryContent"></div>
      </section>
    </main>

    <footer class="bottom-data-status-bar" id="dataStatusBar"></footer>
  </div>

  <button
    type="button"
    class="drawer-trigger-btn"
    id="recommendationDrawerTrigger"
    aria-controls="recommendationPanel"
    aria-expanded="false"
  >
    通知工程師
  </button>

  <div class="drawer-overlay" id="drawerOverlay"></div>

  <aside
    class="right-recommendation-panel drawer-panel"
    id="recommendationPanel"
    aria-hidden="true"
  ></aside>

  <div class="station-detail-overlay" id="stationDetailOverlay"></div>

  <section
    class="station-detail-panel"
    id="stationDetailPanel"
    aria-hidden="true"
    aria-label="站別詳細資料"
  ></section>

  <script src="dashboard.js"></script>
</body>
</html>
